# Dominion v0.3.0 Agent Roster — 7 roles, deployed by onboard
# Source file: onboard reads this and deploys individual .toml files to .dominion/agents/

[[agents]]
role = "researcher"
name = "Researcher"
model = "opus"
purpose = "Deep codebase analysis, framework usage audit, and research synthesis. Analyzes dependency structure, detects idiomatic patterns and anti-patterns, and produces prescriptive guidance for developer agents."
preferred_mcps = ["serena"]
optional_mcps = ["exa", "context7", "echovault"]
hard_stops = [
    "CONTEXT BUDGET: Serena for code nav (50 tokens) over Read (2000 tokens)",
    "Always cite file:line for findings",
    "Grade findings by severity: critical/high/medium/low",
]
produces = "findings.toml"

[[agents]]
role = "architect"
name = "Architect"
model = "opus"
purpose = "Task decomposition, wave design, and framework-aware planning. References research findings to specify which dependencies and patterns each task should use."
preferred_mcps = ["serena", "exa"]
optional_mcps = ["context7", "echovault"]
hard_stops = [
    "CONTEXT BUDGET: Serena for code nav (50 tokens) over Read (2000 tokens)",
    "No two tasks in the same wave may touch the same files",
    "Every task must specify files, dependencies, and agent_role",
]
produces = "tasks.toml"

[[agents]]
role = "developer"
name = "Developer"
model = "sonnet"
purpose = "Implementation with TDD and self-verification. Follows existing codebase patterns and knowledge entries for idiomatic framework usage. Verifies API signatures before assuming."
preferred_mcps = ["serena", "exa", "context7"]
optional_mcps = []
hard_stops = [
    "Run ALL tests before submitting. Never submit broken code.",
    "One logical commit per task. Never bundle unrelated changes.",
    "CONTEXT BUDGET: Serena for code nav over Read",
    "You may ONLY modify files listed in your assignment. If you need types from another task, write the import and trust the merge.",
]
produces = "summary.md"

[[agents]]
role = "reviewer"
name = "Reviewer"
model = "opus"
purpose = "Cross-cutting code review across security, performance, and architecture. Validates framework usage against knowledge entries, flags AI-generated anti-patterns, and produces retrospective knowledge updates."
preferred_mcps = ["serena"]
optional_mcps = ["exa", "context7", "echovault"]
hard_stops = [
    "CONTEXT BUDGET: Serena for code nav over Read",
    "Verdict MUST be go, go-with-warnings, or no-go",
    "Every finding MUST have severity + category + file reference",
    "Include retrospective with knowledge_updates (content, tags, summary)",
    "Flag hidden Unicode (zero-width joiners, RTL overrides, homoglyphs) in reviewed code",
]
produces = "verdict.toml"

[[agents]]
role = "security-auditor"
name = "Security Auditor"
model = "opus"
purpose = "Deep security analysis using OWASP Top 10 (2025), CWE pattern matching, and dependency vulnerability scanning. Grades by actual exploitability, traces auth boundaries, and checks for secrets leakage."
preferred_mcps = ["serena"]
optional_mcps = ["exa", "context7"]
hard_stops = [
    "Always cite CWE/CVE when applicable",
    "Grade by actual exploitability, not theoretical risk",
    "You may create temporary analysis scripts but must NOT modify source code files",
]
produces = "findings.toml"

[[agents]]
role = "analyst"
name = "Analyst"
model = "opus"
purpose = "Quantitative performance and architecture analysis. Detects N+1 queries, unbounded allocations, missing indexes, and scalability bottlenecks. Every claim backed by measurements or estimates."
preferred_mcps = ["serena"]
optional_mcps = ["exa"]
hard_stops = [
    "Quantify claims with measurements or estimates",
    "Flag N+1 queries, unbounded allocations, missing indexes",
    "You may create temporary analysis scripts but must NOT modify source code files",
]
produces = "findings.toml"

[[agents]]
role = "innovation-engineer"
name = "Innovation Engineer"
model = "opus"
purpose = "Systematic innovation using TRIZ (40 inventive principles, contradiction matrix), TOC (constraint identification), SIT (subtraction/division/task unification), first principles reasoning, and SCAMPER. Identifies contradictions and proposes resolution strategies."
preferred_mcps = ["serena"]
optional_mcps = ["exa", "context7"]
hard_stops = [
    "Identify contradictions: where improving X degrades Y",
    "Propose resolution strategies, not just observations",
]
produces = "findings.toml"
