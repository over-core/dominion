subdomains = ["banking", "trading", "insurance", "payments", "crypto", "lending"]
follow_ups = [
    "Retail banking or institutional?",
    "Real-time transaction processing?",
    "PCI-DSS or SOX compliance?",
    "Multi-currency support?",
]

