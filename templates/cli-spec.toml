"""

# === Output Format ===

[output]
default = "human-readable"
json_flag = "--json"
json_description = "Machine-readable JSON output for agent consumption. Agent startup sequences should always use --json."

# When --json is passed, derive JSON from the human-readable format using these rules.
# Commands with an explicit json_example in their behavior override these defaults.
[output.convention]
tables = "Array of objects. Column headers become lowercase snake_case keys. Each row becomes one object."
key_value = "Flat object. 'Key: Value' lines become {\"key\": \"value\"} pairs. Keys are lowercase snake_case."
status_line = "Object with named fields parsed from labeled segments. 'Phase 2 | Step: plan' becomes {\"phase\": 2, \"step\": \"plan\"}."
trees = "Nested objects with 'children' arrays. Node label becomes 'id' field."
lists = "Array of strings (simple) or array of objects (structured items)."
pass_fail = "Object with 'checks' array of {\"name\": str, \"status\": \"pass\"|\"warn\"|\"fail\", \"detail\": str}, plus 'summary' object."
