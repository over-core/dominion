# Dominion Improvements — Schema Template
# Cumulative journal of all improvement proposals across phases

[meta]
schema_version = 1

[[proposals]]
id = ""                             # P1, P2, ... (unique across all phases)
phase = 0                           # phase that generated this proposal
type = ""                           # tooling | governance | convention
title = ""
evidence = []                       # file references (summaries, review findings)
reason = ""                         # why this improvement matters
status = "pending"                  # pending | accepted | rejected | rolled-back
applied_at = ""                     # commit hash when applied
applied_by = ""                     # direct | pipeline (hybrid apply model)
