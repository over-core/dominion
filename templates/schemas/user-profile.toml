# Dominion User Profile — Schema Template
# Stored at ~/.claude/.dominion/user-profile.toml
# Strictly local — never committed to git, never shared.

[meta]
schema_version = 1

[user]
experience_level = "intermediate"    # beginner | intermediate | advanced

[user.preferences]
# Key-value pairs of explicit user preferences
# Populated from wizard answers and explicit "I prefer X" statements
# Examples:
# git_style = "conventional-commits"
# merge_strategy = "squash"
# verbosity = "concise"              # verbose | concise | terse

[user.tool_opinions]
# Personal tool ratings — override registry defaults for this user
# Examples:
# [user.tool_opinions.context7]
# rating = 5
# notes = "essential"

[sessions]
count = 0                            # incremented by session start hook
first_session = ""                   # ISO 8601
last_session = ""                    # ISO 8601
