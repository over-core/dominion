# Dominion Security Findings — Schema Template
# Security Auditor output, per-phase findings with CWE classification and remediation tracking

[meta]
schema_version = 1
phase = 0

[[findings]]
id = ""                             # SF1, SF2, ...
cwe = ""                            # CWE identifier (e.g. "CWE-79", "CWE-89"), empty if no mapping
severity = ""                       # critical | high | medium | low | info
status = "new"                      # new | fixed | regressed | acknowledged
title = ""
description = ""
evidence = []                       # file:line references
recommendation = ""
discovered_phase = 0                # phase number where first found
category = ""                       # injection | auth | crypto | dependency | configuration | data-exposure | access-control
method = ""                         # which security method found this (STRIDE, OWASP, SCA, etc.)

[summary]
total = 0
critical = 0
high = 0
medium = 0
low = 0
info = 0
new = 0
fixed = 0
regressed = 0
