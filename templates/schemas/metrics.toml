# Dominion Metrics — Schema Template
# Phase-level quality and process metrics, generated by Reviewer after each phase review

[phase]
number = 0

[quality]
tests_added = 0
tests_passing = 0
linter_warnings = 0
coverage_delta = ""                 # "+12%", "-3%", "N/A"
review_findings_high = 0
review_findings_medium = 0
review_findings_low = 0
acceptance_criteria_passed = 0
acceptance_criteria_failed = 0

[process]
tasks_completed = 0
tasks_failed = 0
tasks_replanned = 0
waves_count = 0
blockers_encountered = 0
rollbacks_performed = 0
average_tokens_per_task = 0
improvement_proposals = 0

# Recurring indicators — measured at every phase boundary by Analyst
[indicators]
measured_at = ""                    # ISO 8601 timestamp of measurement

[indicators.build_time]
value_seconds = 0
previous = 0
delta_pct = 0
threshold_pct = 20                  # warn if delta exceeds this
status = "ok"                       # ok | warning | regression

[indicators.test_duration]
value_seconds = 0
previous = 0
delta_pct = 0
threshold_pct = 20
status = "ok"

[indicators.test_count]
value = 0
previous = 0
delta = 0

[indicators.dependency_count]
value = 0
previous = 0
delta = 0
