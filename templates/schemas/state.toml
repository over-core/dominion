# Dominion State — Schema Template
# Gitignored. Each developer maintains their own session state.
# Auto-maintained by Secretary + session hooks.

[meta]
schema_version = 2

[position]
phase = 0                           # 0 = init complete, no phase started
step = "idle"                       # idle | discuss | research | plan | execute | audit | review | improve
wave = 0                            # current wave number, 0 = not in execute
current_task = ""                   # task id being executed, "" = none
status = "ready"                    # ready | active | blocked | complete
complexity_level = ""               # trivial | moderate | complex | major — assessed during discuss
last_session = ""                   # date of last session

[init]
completed_at = ""                   # ISO 8601 timestamp
cli_proven = false                  # proving ground passed
validate_passed = false             # /dominion:validate passed

[lock]
session_id = ""                     # set by /dominion:orchestrate, cleared on session end
locked_at = ""                      # ISO 8601 timestamp
expires_after_hours = 8             # auto-expire stale locks

[blocker]
task = ""                           # task id that raised the blocker
level = ""                          # task | wave | phase | critical
reason = ""                         # human-readable description

[outstanding]
deferred = []                       # items deferred for later

[[decisions]]
id = 0
phase = 0
task = ""
agent = ""
text = ""
tags = []

[[autonomous_decisions]]
id = 0
timestamp = ""                      # ISO 8601
phase = 0
task = ""                           # task id context
type = ""                           # replan | skip | retry | split | reorder
description = ""                    # what was decided
reason = ""                         # why — error context, breaker trigger, etc.
session_id = ""                     # which auto session made this
reviewed = false                    # set true after user reviews in improve step
outcome = ""                        # accepted | rolled-back (set during review)

[[mcp_status]]
name = ""                           # MCP name from registry
available = true
checked_at = ""                     # ISO 8601
fallback_active = false             # true if currently using fallback
