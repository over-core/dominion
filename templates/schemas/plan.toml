# Dominion Plan — Schema Template
# Architect output, wave-grouped executable plan per phase

[meta]
schema_version = 1
phase = 0
title = ""

[[tasks]]
id = ""                             # {phase}-{seq} zero-padded, e.g. "02-01"
title = ""
wave = 0
depends_on = []                     # task ids
agent = "Developer"
file_ownership = []                 # directories/files this task may modify
token_estimate = 0                  # estimated tokens for task, 0 = not estimated
knowledge_refs = []                 # knowledge file names relevant to this task (from .dominion/knowledge/)
critical_path = false               # true if on critical dependency chain (CPM-lite)
specialist_referral = ""            # from research.toml, agent routing hint

[tasks.acceptance]
criteria = []                       # list of verifiable done conditions
verify_command = ""                 # shell command to validate, "" if none

[[tasks.assumptions]]
ref = ""                            # references research.toml assumption id

[[tasks.handoffs]]
from = ""                           # upstream task id
note = ""                           # populated by Developer during execution
