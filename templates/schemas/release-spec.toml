# Release Specification — Schema Template
# Generated during /dominion:release bootstrap or init wizard
# Stored at .dominion/specs/release-spec.toml in the project

[meta]
spec_version = "0.8"

[versioning]
strategy = ""                      # semver | calver | custom
source = ""                        # file holding version, e.g., "Cargo.toml", "package.json", "pyproject.toml"
read_command = ""                  # command to read current version
bump_command = ""                  # command to bump version, use {{level}} (major|minor|patch) and {{version}} placeholders

[build]
command = ""                       # e.g., "cargo build --release", "npm run build", ""
artifacts = []                     # paths to attach to release, e.g., ["target/release/myapp", "dist/"]
pre_build = []                     # commands before build, e.g., ["npm ci"]
post_build = []                    # commands after build, e.g., ["strip target/release/myapp"]

[publish]
registries = []                    # e.g., ["github-releases", "npm", "docker"]

[[publish.steps]]
name = ""                          # e.g., "github-release", "npm-publish"
registry = ""                      # which registry this step targets
command = ""                       # e.g., "npm publish", "docker push {{image}}"
auth_check = ""                    # command to verify auth, e.g., "npm whoami", "gh auth status"
skip_if = ""                       # condition to skip, e.g., "private"

[changelog]
format = ""                        # conventional | keep-a-changelog | custom
output = ""                        # e.g., "CHANGELOG.md"
group_by = "type"                  # type | scope | flat
