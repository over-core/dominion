# Dominion Project Configuration — Schema Template
# Customized per project during /dominion:init

[meta]
schema_version = 1
dominion_version = "0.1.0"

[project]
name = ""                           # detected or user-provided
vision = ""                         # user-provided during wizard
target_users = ""                   # user-provided during wizard

[project.constraints]
team_size = ""                      # "solo + AI agents", "small team", etc.
hard_rules = []                     # user-provided mandatory constraints

[[project.success_criteria]]
description = ""
status = "pending"                  # pending | in-progress | done

[direction]
mode = "maintain"                   # maintain | improve | restructure

# Only populated when mode = "restructure"
[direction.restructure]
target_state = ""                   # description of target architecture
migration_strategy = ""             # strangler-fig | big-bang | incremental

[[direction.restructure.legacy_zones]]
path = ""                           # directory path
policy = "minimal-change"           # minimal-change (only policy for now)

# Brownfield claim provenance (only populated after /dominion:claim)
[claim]
claimed_at = ""                      # ISO 8601, empty if greenfield init
source_setup = ""                    # "claude-code-native" | "gsd" | "conductor" | "custom" | ""

[[claim.preserved]]
artifact = ""                        # e.g., "CLAUDE.md", ".claude/agents/reviewer.md"
sections = []                        # which sections were user-original
policy = "never-overwrite"           # Dominion will not touch these

[[claim.added]]
artifact = ""                        # what Dominion added
source = "dominion-generated"        # provenance

# Documentation fallback chain
[[documentation.sources]]
name = "context7"
type = "mcp"
priority = 1

[[documentation.sources]]
name = "official-docs"
type = "web"
priority = 2

[documentation.fallback]
action = "stop-and-ask"
message = "Could not find docs. Do NOT read source files or trial-and-error compile."

# CLI configuration
[cli]
spec_version = "0.1"
language = ""                       # detected primary language
build_system = ""                   # detected build system

# MCP configuration (detected + recommended)
[mcps]
installed = []                      # detected at init
recommended = []                    # from registry cross-reference
missing_required = []               # required but not installed

# Autonomy configuration
[autonomy]
mode = "interactive"               # interactive | auto

[autonomy.circuit_breakers]
max_tokens_per_task = 150000        # agent context capacity, 0 = no limit
max_retry_attempts = 3              # 0 = no limit
max_cascade_replans = 2             # 0 = no limit
max_failed_tasks_per_wave = 0       # 0 = no limit
session_time_limit_hours = 8        # 0 = no limit

[autonomy.replan_constraints]
can_split_tasks = true
can_reorder_within_wave = true
can_add_dependencies = true
cannot_change_wave_count = true
cannot_modify_completed_tasks = true
cannot_alter_governance_rules = true
