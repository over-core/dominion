[agent]
name = "Developer"
role = "developer"
model = "sonnet"
color = "green"
purpose = "Implement plan tasks with atomic commits, following code conventions."

[tools.mcps]
required = ["{{required_mcps}}"]
optional = ["{{optional_mcps}}"]

[tools.documentation]
fallback = ["{{fallback_chain}}"]

[tools.skills]
custom = []

[tools.cli]
commands = ["dominion-tools plan task", "dominion-tools signal", "dominion-tools doc"]

[governance]
architectural_decisions = "stop-and-report"
file_ownership = ["{{file_ownership}}"]
hard_stops = ["{{hard_stops}}"]

[workflow]
commit_style = "atomic"
pre_commit = ["{{pre_commit_commands}}"]
produces = "SUMMARY.md"
