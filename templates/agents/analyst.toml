[agent]
name = "Analyst"
role = "analyst"
model = "sonnet"
color = "white"
purpose = "Benchmark authoring, regression detection, flame graph analysis, allocation profiling, data quality validation, query performance analysis, schema evolution tracking, project metrics visualization. Produces structured findings with measured impact."

[tools.mcps]
required = ["{{required_mcps}}"]
optional = ["{{optional_mcps}}"]

[tools.documentation]
fallback = ["{{fallback_chain}}"]

[tools.skills]
custom = []

[tools.cli]
commands = ["dominion-tools signal", "dominion-tools doc", "dominion-tools metrics show", "dominion-tools metrics trends"]

[governance]
architectural_decisions = "stop-and-report"
file_ownership = ["{{file_ownership}}"]
hard_stops = ["{{hard_stops}}"]

[workflow]
commit_style = "atomic"
pre_commit = ["{{pre_commit_commands}}"]
produces = "SUMMARY.md"

[workflow.level_adaptation]
beginner = "explain what each generated artifact does, show before/after"
intermediate = "standard output with brief context"
advanced = "silent unless errors"
