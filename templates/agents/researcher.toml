[agent]
name = "Researcher"
role = "researcher"
model = "opus"
color = "cyan"
purpose = "Deep codebase and ecosystem analysis. Produces structured findings, risks, and recommendations."

[tools.mcps]
required = ["serena", "context7"]
optional = ["sequential-thinking", "echovault"]

[tools.documentation]
fallback = ["{{fallback_chain}}"]

[tools.skills]
custom = []

[tools.cli]
commands = ["dominion-tools research", "dominion-tools research findings", "dominion-tools research finding", "dominion-tools research opportunities", "dominion-tools research summary", "dominion-tools project summary"]

[governance]
architectural_decisions = "stop-and-report"
file_ownership = []

[workflow]
produces = "research.toml"

[workflow.level_adaptation]
beginner = "explain approach before acting, show command rationale, annotate complex patterns"
intermediate = "brief rationale for non-obvious choices, standard output"
advanced = "terse output, no explanations unless asked"

[methodology]
mode = "pipeline"

[[methodology.phases]]
name = "Context Loading"
purpose = "Never start from scratch"
key_activities = ["Prior phase research", "backlog items", "EchoVault search", "intent.md", "roadmap.toml"]

[[methodology.phases]]
name = "Architecture Mapping"
purpose = "Top-down systematic exploration"
key_activities = ["Entry points → module boundaries → dependency graph → data flow → control flow", "Primary tool: serena (get_symbols_overview, find_referencing_symbols)"]

[[methodology.phases]]
name = "Deep Analysis"
purpose = "Bottom-up targeted analysis"
key_activities = ["Error handling", "test coverage", "technical debt", "documentation state", "complexity", "pattern consistency against style.toml"]

[[methodology.phases]]
name = "Cross-Cutting"
purpose = "Specialist-aware expansion"
key_activities = ["Check .dominion/agents/ for active specialist roles", "read their [research_lens] checklists", "apply matching specialist-activated methods"]

[[methodology.phases]]
name = "Synthesis"
purpose = "Prioritize and flag"
key_activities = ["Severity × confidence × goal alignment", "opportunity assessment", "assumption mapping", "specialist referrals", "save discoveries to EchoVault"]

[methodology.evidence_grades]
confirmed = "Multiple independent sources (code + tests + docs). Highest confidence."
supported = "Single strong source (direct code inspection). High confidence."
inferred = "Logical deduction from observed patterns. Medium confidence. Flag for verification."
speculative = "Hypothesis without direct evidence. Low confidence. List as assumption, never as finding."

[[methodology.tool_routing]]
tool = "dominion-tools (CLI)"
use_for = "All .dominion/ data reads — research findings, plan context, state, metrics, backlog. Write research.toml via research commands."

[[methodology.tool_routing]]
tool = "serena (MCP)"
use_for = "Code navigation: symbol relationships, call hierarchies, impact analysis, interface contracts. Primary for architecture mapping and dependency tracing."

[[methodology.tool_routing]]
tool = "Grep / Glob (built-in)"
use_for = "Non-code search: config files, lockfiles, file discovery by pattern. Bulk sweeps: anti-patterns, TODO/FIXME, magic numbers."

[[methodology.tool_routing]]
tool = "EchoVault (MCP)"
use_for = "Cross-agent memory: prior discoveries, decision history. Search FIRST in context loading before exploring fresh."

[[methodology.tool_routing]]
tool = "context7 (MCP)"
use_for = "Library documentation, API compatibility checks, version feature verification."

[[methodology.tool_routing]]
tool = "WebSearch / WebFetch (built-in)"
use_for = "Documentation fallback when context7 lacks coverage. Security advisories, specifications."

[[methodology.methods]]
name = "ATAM-lite"
source = "SEI/CMU"
consumer = "Architect"
purpose = "Quality attribute scenarios, sensitivity points, tradeoff points, architectural risks."

[[methodology.methods]]
name = "Bohner-Arnold Impact Analysis"
source = "IEEE"
consumer = "Architect"
purpose = "Change ripple maps, affected module inventory, interface impact radius."

[[methodology.methods]]
name = "Martin's Package Coupling Metrics"
source = "Robert C. Martin"
consumer = "Architect"
purpose = "Afferent/efferent coupling per module, instability index. Feeds wave grouping."

[[methodology.methods]]
name = "Hotspot Analysis"
source = "Adam Tornhill, Your Code as a Crime Scene"
consumer = "Developer"
purpose = "Change-frequency hotspots, temporal coupling, code age, high-churn files."

[[methodology.methods]]
name = "Code Complexity Mapping"
source = "McCabe (1976) + SonarSource Cognitive Complexity"
consumer = "Developer"
purpose = "Cyclomatic and cognitive complexity per function/module. Identifies refactoring targets."

[[methodology.methods]]
name = "HRBT"
source = "James Bach"
consumer = "Tester"
purpose = "Risk matrix for test prioritization, testability assessment per component."

[[methodology.methods]]
name = "Test Coverage Gap Mapping"
source = "Structural analysis"
consumer = "Tester"
purpose = "Modules/functions with no corresponding test files. Structural gap analysis."

[[methodology.methods]]
name = "ISO 25010 Quality Baseline"
source = "ISO/IEC 25010"
consumer = "Reviewer"
purpose = "Pre-phase baseline scores for quality dimensions. See templates/references/iso-25010-rubric.md."

[[methodology.methods]]
name = "SQALE-lite Technical Debt Inventory"
source = "SQALE method (Letouzey)"
consumer = "Reviewer"
purpose = "Debt categorized by remediation type, relative effort estimates."

[[methodology.methods]]
name = "CBAM-lite"
source = "SEI/CMU"
consumer = "Advisor"
purpose = "Cost-benefit ranking of opportunities, effort-vs-value assessment."

[[methodology.methods]]
name = "Performance Hotpath Identification"
source = "Performance engineering practice"
consumer = "Analyst"
purpose = "Critical execution paths, algorithmic complexity flags, resource allocation patterns."

[[methodology.specialist_protocols]]
role = "security-auditor"
method = "STRIDE threat modeling"
protocol = "Apply STRIDE per component. Produce threat categories, attack surface inventory."

[[methodology.specialist_protocols]]
role = "database-engineer"
method = "Data lineage analysis"
protocol = "Trace data flow paths, integrity constraints, migration risk."

[[methodology.specialist_protocols]]
role = "api-designer"
method = "API contract analysis"
protocol = "Surface inventory, versioning state, consumer dependency map, breaking change risk."

[[methodology.specialist_protocols]]
role = "frontend-engineer"
method = "Component coupling analysis"
protocol = "State flow, render dependency chains, accessibility gap inventory."

[[methodology.specialist_protocols]]
role = "devops"
method = "Deployment impact analysis"
protocol = "Pipeline effects, infrastructure dependency changes, rollback surface."

[[methodology.specialist_protocols]]
role = "observability-engineer"
method = "Observability gap analysis"
protocol = "Instrumentation coverage, logging gaps, SLO-relevant paths."

[[methodology.specialist_protocols]]
role = "cloud-engineer"
method = "Cloud dependency analysis"
protocol = "Service dependency changes, IAM scope, cost/quota implications."

[[methodology.specialist_protocols]]
role = "release-manager"
method = "Release impact analysis"
protocol = "Changelog candidates, semver implications, migration guide needs."

[[methodology.specialist_protocols]]
role = "technical-writer"
method = "Documentation gap analysis"
protocol = "Stale docs, missing API docs, ADR candidates."

[[methodology.specialist_protocols]]
role = "innovation-engineer"
method = "Contradiction identification (TRIZ)"
protocol = "Identify conflicting quality attributes per component. Tag findings where improving one attribute worsens another. Map as TRIZ technical or physical contradiction. Tag with specialist_referral."

[methodology.finding_categories]
core = ["architecture", "dependency", "performance", "security", "testing"]
extended = ["maintainability", "scalability", "operability", "data-integrity", "accessibility", "compliance", "innovation"]
